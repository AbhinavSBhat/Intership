<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    
    <h1>Registration Form</h1>
    <br>
    <br>
    <form>

        <label for="fullname">Name</label>
        <input type="text" name="fullname" id="fullname" required placeholder="Enter Your Name">
        <br>
        <br>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" required placeholder="Email id">
        <br>
        <br>


        <label for="psw">Password</label>
        <input type="password" name="psw" id="psw" required placeholder="password">
        <br>
        <br>

        <label for="gender">Gender</label> <br>
        <input type="radio" value="Male" name="gender">Male
        <input type="radio" value="Female" name="gender">Female
        <input type="radio" value="Others" name="gender">Others
        <br>
        <br>

        <label for="skills">Skills Known</label> <br>
        <input type="checkbox" value="HTML" name="skills">HTML
        <input type="checkbox" value="JavaScript" name="skills">JavaScript
        <input type="checkbox" value="React" name="skills">React
        <input type="checkbox" value="Python" name="skills">Python
        <br><br>

        <label for="country">Country</label>
        <select>
            <option>Select Country...</option>
            <option>India</option>
            <option>Canada</option>
            <option>Russia</option>
            <option>Other...</option>
        </select>
        <br><br>

        <label for="abt">About Yourself</label><br>
        <textarea rows="6"></textarea>
        <br><br>

        <label for="resume">Upload Resume</label>
        <input type="file" name="resume" id="resume">
        <br><br>

         <label>Date of Birth:</label><br>
        <input type="date">
        <br><br>

        <input type="submit" value="Register">
        <input type="reset" value="Reset">

        

    </form>

</body>
</html>
